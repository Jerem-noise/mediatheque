<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médiathèque</title>

<style>
body{
  font-family:system-ui;
  max-width:800px;
  margin:auto;
  padding:20px;
  background:#f5f7fb;
}

h2{text-align:center}

input,select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#4a6fa5;
  color:#fff;
  border:none;
  cursor:pointer;
}

.row{
  display:flex;
  gap:6px;
}

.row button{
  flex:1;
  font-size:12px;
}

.card{
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.small{font-size:12px;color:#666}

.badge{
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
}

.j{background:#dbeafe}
.m{background:#fce7f3}

#auto{
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  max-height:180px;
  overflow:auto;
}

.item{
  padding:8px;
  cursor:pointer;
}
.item:hover{background:#f3f4f6}
</style>
</head>

<body>

<h2>📚 Médiathèque</h2>

<div id="stats" class="small"></div>

<input id="title" placeholder="Titre">
<div id="auto"></div>

<input id="author" placeholder="Auteur">

<select id="member">
  <option>Jérémy</option>
  <option>Marion</option>
</select>

<input type="date" id="date">

<button onclick="addBook()">➕ Ajouter</button>

<div class="row">
  <button onclick="setFilter('all')">Tous</button>
  <button onclick="setFilter('Jérémy')">Jérémy</button>
  <button onclick="setFilter('Marion')">Marion</button>
</div>

<div id="list"></div>

<script>

/* ================= STATE ================= */
const WORKER = "https://proxy-bnf.batteux-jerem.workers.dev";
let books = JSON.parse(localStorage.getItem("books_v1") || "[]");
let filter = "all";
let cache = {};

/* ================= DOM ================= */
const titleEl = document.getElementById("title");
const authorEl = document.getElementById("author");
const memberEl = document.getElementById("member");
const dateEl = document.getElementById("date");
const listEl = document.getElementById("list");
const autoEl = document.getElementById("auto");

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("books_v1", JSON.stringify(books));
}

/* ================= DATE ================= */
function computeReturn(d){
  const x = new Date(d);
  x.setMonth(x.getMonth()+1);
  return x.toISOString().split("T")[0];
}

/* ================= ADD ================= */
function addBook(){
  if(!titleEl.value || !dateEl.value) return;

  books.unshift({
    id: Date.now(),
    title: titleEl.value,
    author: authorEl.value,
    member: memberEl.value,
    date: dateEl.value,
    return: computeReturn(dateEl.value)
  });

  save();
  render();

  titleEl.value="";
  authorEl.value="";
  autoEl.innerHTML="";
}

/* ================= DELETE ================= */
function del(id){
  books = books.filter(b=>b.id!==id);
  save();
  render();
}

/* ================= FILTER ================= */
function setFilter(f){
  filter = f;
  render();
}

/* ================= RENDER ================= */
function render(){

  const sorted = [...books]
    .filter(b => filter==="all" ? true : b.member===filter)
    .sort((a,b)=>new Date(a.return)-new Date(b.return));

  listEl.innerHTML = sorted.map(b => {

    const gcal =
      "https://calendar.google.com/calendar/render?action=TEMPLATE"+
      "&text="+encodeURIComponent("📚 "+b.title)+
      "&dates="+b.return.replaceAll("-","")+"/"+b.return.replaceAll("-","");

    return `
      <div class="card">
        <b>${b.title}</b><br>
        <span class="small">${b.author||""}</span><br>

        <span class="badge ${b.member==="Jérémy"?"j":"m"}">
          ${b.member}
        </span>

        <div class="small">📅 ${b.return}</div>

        <div class="row">
          <button onclick="window.open('${gcal}','_blank')">
            Google Calendar
          </button>
          <button onclick="del(${b.id})" style="background:#e74c3c">
            Supprimer
          </button>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("stats").innerText =
    `📚 ${books.length} livres`;
}

/* ================= AUTOCOMPLETE ================= */
let t;

titleEl.addEventListener("input", ()=>{

  clearTimeout(t);

  t = setTimeout(async ()=>{

    const q = titleEl.value.trim();
    if(q.length < 2) return;

    if(cache[q]){
      draw(cache[q]);
      return;
    }

    try{
      const r = await fetch(`${WORKER}?q=${encodeURIComponent(q)}`);
      const data = await r.json();

      cache[q] = data;
      draw(data);

    }catch(e){
      autoEl.innerHTML="";
    }

  },200);
});

function draw(data){
  autoEl.innerHTML = (data || []).slice(0,8).map(b => `
    <div class="item" onclick="pick('${esc(b.title)}','${esc(b.author||"")}')">
      📖 ${b.title}
    </div>
  `).join("");
}

function pick(t,a){
  titleEl.value=t;
  authorEl.value=a;
  autoEl.innerHTML="";
}

function esc(s=""){
  return s.replaceAll("'","&#39;").replaceAll('"',"&quot;");
}

/* ================= INIT ================= */
render();

</script>

</body>
</html>
