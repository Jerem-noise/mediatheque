<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Médiathèque" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Ma Médiathèque</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Lato', 'Helvetica Neue', sans-serif; background: linear-gradient(135deg, #f0f4ff 0%, #faf0ff 100%); min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }
    .autocomplete-list {
      position: absolute; z-index: 1000; background: #fff;
      border: 1.5px solid #c5d8f5; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(74,111,165,0.15);
      max-height: 280px; overflow-y: auto; width: 100%; left: 0; top: 100%;
    }
    .autocomplete-item {
      padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 10px;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.active { background: #f0f4ff; }
    .autocomplete-wrapper { position: relative; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #4a6fa5; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const MEMBERS = ["Jérémy", "Marion"];
const RATINGS = [1, 2, 3, 4, 5];

const SCHOOL_HOLIDAYS = [
  { start: "2024-10-19", end: "2024-11-04" },
  { start: "2024-12-21", end: "2025-01-06" },
  { start: "2025-02-22", end: "2025-03-10" },
  { start: "2025-04-19", end: "2025-05-05" },
  { start: "2025-07-05", end: "2025-09-01" },
  { start: "2025-10-18", end: "2025-11-03" },
  { start: "2025-12-20", end: "2026-01-05" },
  { start: "2026-02-14", end: "2026-03-02" },
  { start: "2026-04-18", end: "2026-05-04" },
  { start: "2026-07-04", end: "2026-09-01" },
];

function isSchoolHoliday(dateStr) {
  const d = new Date(dateStr);
  return SCHOOL_HOLIDAYS.some(({ start, end }) => d >= new Date(start) && d <= new Date(end));
}

function computeReturnDate(dateStr) {
  const d = new Date(dateStr);
  if (isSchoolHoliday(dateStr)) { d.setDate(d.getDate() + 45); }
  else { d.setMonth(d.getMonth() + 1); }
  return d.toISOString().split("T")[0];
}

function daysLeft(returnDate) {
  const today = new Date(); today.setHours(0,0,0,0);
  const ret = new Date(returnDate); ret.setHours(0,0,0,0);
  return Math.ceil((ret - today) / 86400000);
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
}

function addToCalendar(book) {
  const d = book.returnDate.replace(/-/g, "");
  const dNext = (() => { const dt = new Date(book.returnDate); dt.setDate(dt.getDate()+1); return dt.toISOString().split("T")[0].replace(/-/g,""); })();
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    const ics = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
      "DTSTART;VALUE=DATE:"+d,"DTEND;VALUE=DATE:"+dNext,
      "SUMMARY:📚 Rendre : "+book.title+" ("+book.member+")",
      "DESCRIPTION:Emprunté le "+formatDate(book.borrowDate),
      "BEGIN:VALARM","TRIGGER:-PT0S","ACTION:DISPLAY","DESCRIPTION:Rappel médiathèque","END:VALARM",
      "END:VEVENT","END:VCALENDAR"].join("\r\n");
    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "rappel.ics"; a.click();
    URL.revokeObjectURL(url);
  } else {
    const title = encodeURIComponent("📚 Rendre : "+book.title+" ("+book.member+")");
    const details = encodeURIComponent("Emprunté le "+formatDate(book.borrowDate));
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${d}/${dNext}&details=${details}`,"_blank");
  }
}

// Fonction utilitaire pour parser le XML MarcXchange de la BnF
function parseBnfXml(xmlText) {
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(xmlText, "text/xml");
  const records = xmlDoc.getElementsByTagName("srw:record");
  const results = [];

  for (let i = 0; i < records.length; i++) {
    const record = records[i];
    
    // Extraction via des sélecteurs sur les balises de données MarcXchange
    const getBnfField = (tag, code) => {
      const datafield = record.querySelector(`datafield[tag="${tag}"]`);
      if (!datafield) return "";
      if (code) {
        const subfield = datafield.querySelector(`subfield[code="${code}"]`);
        return subfield ? subfield.textContent.trim() : "";
      }
      return datafield.textContent.trim();
    };

    // 200$a = Titre principal
    let title = getBnfField("200", "a");
    // 200$e = Complément de titre (optionnel)
    const subtitle = getBnfField("200", "e");
    if (subtitle) title += ` : ${subtitle}`;

    // 200$f = Premier auteur
    let author = getBnfField("200", "f");
    // Alternativement dans le champ 700 (Auteur principal)
    if (!author) author = getBnfField("700", "a") + " " + getBnfField("700", "b");

    // 210$d = Année de publication
    const year = getBnfField("210", "d").replace(/[^0-9]/g, "").slice(0, 4);

    // 010$a = ISBN
    const isbn = getBnfField("010", "a").replace(/[^0-9X]/gi, "");

    if (title) {
      results.push({
        title: title,
        author: author || "Auteur inconnu",
        cover: isbn ? `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg` : null, // La BnF ne fournit pas d'images de couvertures facilement, on passe par l'API OpenLibrary pour la cover
        isbn: isbn,
        year: year,
        source: "BnF"
      });
    }
  }
  return results;
}

// Recherche combinée : BnF (via Proxy CORS) avec repli sur Open Library
let searchTimeout = null;
async function searchBooks(query) {
  if (query.length < 2) return [];
  const q = encodeURIComponent(query);
  
  // Utilisation d'un proxy CORS pour l'API BnF (indispensable côté client)
  const proxyUrl = "https://cors-anywhere.herokuapp.com/";
  const bnfUrl = `${proxyUrl}https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.anywhere%20all%20%22${q}%22%20and%20bib.recordtype%20all%20%22a%22&maximumRecords=8&recordSchema=marcxchange`;

  try {
    const res = await fetch(bnfUrl, { headers: { "X-Requested-With": "XMLHttpRequest" } });
    if (res.ok) {
      const xmlText = await res.text();
      const bnfResults = parseBnfXml(xmlText);
      if (bnfResults.length > 0) return bnfResults;
    }
  } catch(e) {
    console.warn("Échec de la recherche BnF (Vérifiez le proxy CORS), bascule sur OpenLibrary...", e);
  }

  // Repli (Fallback) sur OpenLibrary si la BnF ne renvoie rien ou échoue
  try {
    const olUrl = `https://openlibrary.org/search.json?q=${q}&lang=fre&limit=8&fields=title,author_name,cover_i,isbn,first_publish_year`;
    const res = await fetch(olUrl);
    const data = await res.json();

    return (data.docs || []).map(d => ({
      title: d.title || "",
      author: (d.author_name || []).slice(0,2).join(", "),
      cover: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null,
      isbn: d.isbn?.[0] || "",
      year: d.first_publish_year || "",
      source: "OpenLibrary"
    }));
  } catch(e) {
    return [];
  }
}

function AutocompleteInput({ value, onChange, onSelectBook, placeholder }) {
  const [suggestions, setSuggestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [showList, setShowList] = useState(false);
  const [activeIdx, setActiveIdx] = useState(-1);
  const wrapperRef = useRef(null);

  useEffect(() => {
    const handleClick = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setShowList(false);
    };
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  const handleChange = (e) => {
    const val = e.target.value;
    onChange(val);
    clearTimeout(searchTimeout);
    if (val.length >= 2) {
      setLoading(true);
      searchTimeout = setTimeout(async () => {
        const results = await searchBooks(val);
        setSuggestions(results);
        setShowList(results.length > 0);
        setLoading(false);
      }, 500);
    } else {
      setSuggestions([]);
      setShowList(false);
      setLoading(false);
    }
    setActiveIdx(-1);
  };

  const handleSelect = (book) => {
    onSelectBook(book);
    setShowList(false);
    setSuggestions([]);
  };

  const handleKeyDown = (e) => {
    if (!showList) return;
    if (e.key === "ArrowDown") { setActiveIdx(i => Math.min(i+1, suggestions.length-1)); e.preventDefault(); }
    else if (e.key === "ArrowUp") { setActiveIdx(i => Math.max(i-1, 0)); e.preventDefault(); }
    else if (e.key === "Enter" && activeIdx >= 0) { handleSelect(suggestions[activeIdx]); e.preventDefault(); }
    else if (e.key === "Escape") setShowList(false);
  };

  return (
    <div className="autocomplete-wrapper" ref={wrapperRef}>
      <div style={{position:"relative"}}>
        <input
          value={value}
          onChange={handleChange}
          onKeyDown={handleKeyDown}
          onFocus={() => suggestions.length > 0 && setShowList(true)}
          placeholder={placeholder}
          style={inputStyle}
          autoComplete="off"
        />
        {loading && (
          <div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)"}}>
            <div className="spinner"/>
          </div>
        )}
      </div>
      {showList && suggestions.length > 0 && (
        <div className="autocomplete-list">
          {suggestions.map((book, i) => (
            <div key={i}
              className={`autocomplete-item${i === activeIdx ? " active" : ""}`}
              onMouseDown={() => handleSelect(book)}>
              {book.cover
                ? <img src={book.cover} alt="" style={{width:30,height:42,objectFit:"cover",borderRadius:3,flexShrink:0}} onError={e=>e.target.style.display='none'}/>
                : <div style={{width:30,height:42,background:"#f0f0f0",borderRadius:3,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📖</div>
              }
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"#1a1a2e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{book.title}</div>
                {book.author && <div style={{fontSize:12,color:"#888",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{book.author}</div>}
                <div style={{fontSize:11,color:"#4a6fa5",marginTop:1}}>{book.year ? `${book.year} · ` : ""}<span style={{fontStyle:"italic",color:"#999"}}>{book.source}</span></div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function StatusBadge({ returnDate, returned }) {
  if (returned) return <span style={{background:"#e8f5e9",color:"#2e7d32",borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700}}>✓ Rendu</span>;
  const days = daysLeft(returnDate);
  if (days < 0) return <span style={{background:"#fde8e8",color:"#c0392b",borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700}}>⚠ En retard de {Math.abs(days)}j</span>;
  if (days <= 5) return <span style={{background:"#fff3e0",color:"#e65100",borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700}}>⏰ {days}j restants</span>;
  return <span style={{background:"#e3f2fd",color:"#1565c0",borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700}}>📅 {days}j restants</span>;
}

function Stars({ rating, onRate }) {
  const [hover, setHover] = useState(0);
  return (
    <div style={{display:"flex",gap:2}}>
      {RATINGS.map(s => (
        <span key={s} onClick={() => onRate && onRate(s)}
          onMouseEnter={() => onRate && setHover(s)} onMouseLeave={() => onRate && setHover(0)}
          style={{cursor:onRate?"pointer":"default",fontSize:20,color:s<=(hover||rating)?"#f4a500":"#ddd",transition:"color 0.15s"}}>★</span>
      ))}
    </div>
  );
}

const inputStyle = {width:"100%",padding:"11px 14px",border:"1.5px solid #ddd",borderRadius:10,fontSize:16,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#fafafa"};
const btnPrimary = {flex:1,padding:"13px",background:"linear-gradient(135deg,#4a6fa5,#6b8fd4)",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"};
const btnSecondary = {flex:1,padding:"13px",background:"#f5f5f5",color:"#555",border:"1.5px solid #ddd",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"};
const iconBtn = (color) => ({width:38,height:38,borderRadius:8,border:"none",background:color+"18",color:color,cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0});

function BookCard({ book, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [editData, setEditData] = useState({...book});
  useEffect(() => { setEditData({...book}); }, [book]);
  const handleSave = () => { onUpdate({...editData}); setEditing(false); };
  const memberColor = book.member === MEMBERS[0] ? "#4a6fa5" : "#b05c8a";

  if (editing) return (
    <div style={{background:"#fff",border:"2px solid #4a6fa5",borderRadius:16,padding:20,boxShadow:"0 4px 20px rgba(74,111,165,0.15)"}}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <AutocompleteInput value={editData.title} onChange={v=>setEditData({...editData,title:v})}
          onSelectBook={b=>setEditData({...editData,title:b.title,author:b.author})} placeholder="Titre"/>
        <input value={editData.author} onChange={e=>setEditData({...editData,author:e.target.value})} placeholder="Auteur" style={inputStyle}/>
        <select value={editData.member} onChange={e=>setEditData({...editData,member:e.target.value})} style={inputStyle}>
          {MEMBERS.map(m=><option key={m}>{m}</option>)}
        </select>
        <div>
          <label style={{fontSize:13,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>Date d'emprunt</label>
          <input type="date" value={editData.borrowDate} onChange={e=>{const bd=e.target.value;setEditData({...editData,borrowDate:bd,returnDate:computeReturnDate(bd),holidayLoan:isSchoolHoliday(bd)});}} style={inputStyle}/>
          {editData.holidayLoan && <div style={{fontSize:12,color:"#7b5ea7",marginTop:4,fontWeight:600}}>🏖 Vacances scolaires — délai de 45 jours</div>}
        </div>
        <div><label style={{fontSize:13,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>Note</label>
          <Stars rating={editData.rating} onRate={r=>setEditData({...editData,rating:r})}/></div>
        <textarea value={editData.comment} onChange={e=>setEditData({...editData,comment:e.target.value})} placeholder="Commentaire (optionnel)" rows={2} style={{...inputStyle,resize:"vertical"}}/>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:15}}>
          <input type="checkbox" checked={editData.returned} onChange={e=>setEditData({...editData,returned:e.target.checked})} style={{width:18,height:18}}/>Livre rendu</label>
        <div style={{display:"flex",gap:8}}>
          <button onClick={handleSave} style={btnPrimary}>💾 Sauvegarder</button>
          <button onClick={()=>setEditing(false)} style={btnSecondary}>Annuler</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{background:"#fff",border:"1.5px solid #eee",borderLeft:`5px solid ${memberColor}`,borderRadius:16,padding:"16px 18px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",opacity:book.returned?0.7:1}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontWeight:700,fontSize:17,color:"#1a1a2e",marginBottom:2,wordBreak:"break-word"}}>{book.title}</div>
          <div style={{fontSize:13,color:"#666",marginBottom:8}}>{book.author}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
            <span style={{background:memberColor+"20",color:memberColor,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{book.member}</span>
            {book.holidayLoan && !book.returned && <span style={{background:"#f3e8ff",color:"#7b5ea7",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>🏖 Vacances</span>}
            <StatusBadge returnDate={book.returnDate} returned={book.returned}/>
          </div>
          <div style={{fontSize:12,color:"#999",marginBottom:8}}>
            Emprunté le {formatDate(book.borrowDate)} · À rendre le <strong style={{color:"#555"}}>{formatDate(book.returnDate)}</strong>
          </div>
          {!book.returned && (
            <button onClick={()=>addToCalendar(book)} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,background:"#f0f7ff",color:"#4a6fa5",border:"1.5px solid #c5d8f5",fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:8}}>
              📅 Ajouter à l'agenda
            </button>
          )}
          {book.rating > 0 && <Stars rating={book.rating}/>}
          {book.comment && <div style={{marginTop:8,fontSize:13,color:"#555",fontStyle:"italic",background:"#f9f9f9",borderRadius:8,padding:"6px 10px"}}>"{book.comment}"</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
          <button onClick={()=>setEditing(true)} style={iconBtn("#4a6fa5")}>✏️</button>
          <button onClick={()=>onDelete(book.id)} style={iconBtn("#e74c3c")}>🗑</button>
        </div>
      </div>
    </div>
  );
}

function AddBookForm({ onAdd, onCancel }) {
  const today = new Date().toISOString().split("T")[0];
  const hol = isSchoolHoliday(today);
  const [form, setForm] = useState({title:"",author:"",member:MEMBERS[0],borrowDate:today,returnDate:computeReturnDate(today),rating:0,comment:"",returned:false,holidayLoan:hol});

  const handleSubmit = () => {
    if (!form.title.trim()) { alert("Le titre est requis."); return; }
    onAdd({...form, id: Date.now()});
  };

  return (
    <div style={{background:"#fff",border:"2px solid #4a6fa5",borderRadius:16,padding:24,boxShadow:"0 8px 32px rgba(74,111,165,0.18)",marginBottom:24}}>
      <h3 style={{margin:"0 0 16px",fontFamily:"'Playfair Display',serif",color:"#1a1a2e",fontSize:18}}>📖 Ajouter un livre</h3>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <AutocompleteInput
          value={form.title}
          onChange={v => setForm({...form, title:v})}
          onSelectBook={b => setForm({...form, title:b.title, author:b.author})}
          placeholder="Titre * (tapez pour chercher)"
        />
        <input value={form.author} onChange={e=>setForm({...form,author:e.target.value})} placeholder="Auteur" style={inputStyle}/>
        <select value={form.member} onChange={e=>setForm({...form,member:e.target.value})} style={inputStyle}>
          {MEMBERS.map(m=><option key={m}>{m}</option>)}
        </select>
        <div>
          <label style={{fontSize:13,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>Date d'emprunt</label>
          <input type="date" value={form.borrowDate} onChange={e=>{const bd=e.target.value;const hol=isSchoolHoliday(bd);setForm({...form,borrowDate:bd,returnDate:computeReturnDate(bd),holidayLoan:hol});}} style={inputStyle}/>
          {form.holidayLoan ? <div style={{fontSize:12,color:"#7b5ea7",marginTop:4,fontWeight:600}}>🏖 Vacances scolaires — délai de 45 jours</div>
            : <div style={{fontSize:12,color:"#999",marginTop:4}}>📅 Période normale — délai de 1 mois</div>}
        </div>
        <div style={{fontSize:13,color:"#555",background:form.holidayLoan?"#f3e8ff":"#f0f4ff",borderRadius:8,padding:"8px 12px",fontWeight:600}}>
          📅 Date de retour : <strong>{formatDate(form.returnDate)}</strong>
        </div>
        <div><label style={{fontSize:13,color:"#666",fontWeight:600,display:"block",marginBottom:4}}>Note (optionnel)</label>
          <Stars rating={form.rating} onRate={r=>setForm({...form,rating:r})}/></div>
        <textarea value={form.comment} onChange={e=>setForm({...form,comment:e.target.value})} placeholder="Commentaire (optionnel)" rows={2} style={{...inputStyle,resize:"vertical"}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={handleSubmit} style={btnPrimary}>✅ Ajouter</button>
          <button onClick={onCancel} style={btnSecondary}>Annuler</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [books, setBooks] = useState(() => {
    try { const s = localStorage.getItem("mediatheque_books_v2"); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  useEffect(() => { localStorage.setItem("mediatheque_books_v2", JSON.stringify(books)); }, [books]);

  const addBook = b => { setBooks([b, ...books]); setShowForm(false); };
  const updateBook = u => setBooks(books.map(b => b.id === u.id ? u : b));
  const deleteBook = id => { if (confirm("Supprimer ce livre ?")) setBooks(books.filter(b => b.id !== id)); };

  const filtered = books.filter(b => {
    const ms = b.title.toLowerCase().includes(search.toLowerCase()) || b.author.toLowerCase().includes(search.toLowerCase());
    if (!ms) return false;
    if (filter === "jeremy") return b.member === MEMBERS[0];
    if (filter === "marion") return b.member === MEMBERS[1];
    if (filter === "active") return !b.returned;
    if (filter === "returned") return b.returned;
    return true;
  });

  const activeCount = books.filter(b=>!b.returned).length;
  const urgentCount = books.filter(b=>!b.returned&&daysLeft(b.returnDate)<=5).length;
  const jeremyCount = books.filter(b=>!b.returned&&b.member===MEMBERS[0]).length;
  const marionCount = books.filter(b=>!b.returned&&b.member===MEMBERS[1]).length;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f0f4ff 0%,#faf0ff 100%)",fontFamily:"'Lato','Helvetica Neue',sans-serif"}}>
      <div style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)",color:"#fff",padding:"32px 20px 20px",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:6}}>📚</div>
        <h1 style={{margin:0,fontFamily:"'Playfair Display',Georgia,serif",fontSize:26,fontWeight:700,letterSpacing:0.5}}>Ma Médiathèque</h1>
        <p style={{margin:"6px 0 0",color:"#aac",fontSize:14}}>Jérémy &amp; Marion</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,background:"#16213e",borderBottom:"3px solid #4a6fa5"}}>
        {[{label:"En cours",value:activeCount,color:"#4a6fa5"},{label:"Urgents",value:urgentCount,color:urgentCount>0?"#e65100":"#4a6fa5"},{label:"Jérémy",value:jeremyCount,color:"#4a6fa5"},{label:"Marion",value:marionCount,color:"#b05c8a"}].map((s,i) => (
          <div key={i} style={{background:"#fff",padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:900,color:s.color}}>{s.value}</div>
            <div style={{fontSize:11,color:"#888",fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 16px 60px"}}>
        {!showForm && (
          <button onClick={()=>setShowForm(true)} style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,#4a6fa5,#6b8fd4)",color:"#fff",border:"none",borderRadius:14,fontSize:17,fontWeight:700,cursor:"pointer",marginBottom:20,boxShadow:"0 4px 16px rgba(74,111,165,0.3)"}}>
            + Ajouter un livre
          </button>
        )}
        {showForm && <AddBookForm onAdd={addBook} onCancel={()=>setShowForm(false)}/>}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher un titre ou auteur..." style={{...inputStyle,marginBottom:12}}/>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          {[{id:"all",label:"Tous"},{id:"active",label:"En cours"},{id:"jeremy",label:"Jérémy"},{id:"marion",label:"Marion"},{id:"returned",label:"Rendus"}].map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:"8px 16px",borderRadius:20,border:"1.5px solid",borderColor:filter===f.id?"#4a6fa5":"#ddd",background:filter===f.id?"#4a6fa5":"#fff",color:filter===f.id?"#fff":"#555",fontSize:14,fontWeight:600,cursor:"pointer"}}>
              {f.label}
            </button>
          ))}
        </div>
        {filtered.length === 0
          ? <div style={{textAlign:"center",padding:"40px 20px",color:"#bbb",fontSize:15}}><div style={{fontSize:48,marginBottom:12}}>📭</div>Aucun livre trouvé.</div>
          : <div style={{display:"flex",flexDirection:"column",gap:12}}>{filtered.map(book=><BookCard key={book.id} book={book} onUpdate={updateBook} onDelete={deleteBook}/>)}</div>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
