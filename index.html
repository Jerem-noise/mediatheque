<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médiathèque Pro V2</title>

<style>
body{
  font-family:system-ui;
  background:#f5f7fb;
  max-width:800px;
  margin:auto;
  padding:20px;
}

h2{text-align:center;}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4a6fa5;
  color:#fff;
  cursor:pointer;
  margin-top:6px;
}

.filters{
  display:flex;
  gap:6px;
  margin:10px 0;
}

.filters button{
  flex:1;
  background:#e5e7eb;
  color:#111;
}

.filters button.active{
  background:#4a6fa5;
  color:#fff;
}

.card{
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.badge{
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
}

.jeremy{background:#dbeafe;}
.marion{background:#fce7f3;}

.auto{
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  max-height:180px;
  overflow:auto;
}

.item{
  padding:8px;
  cursor:pointer;
}
.item:hover{background:#f3f4f6;}

.small{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<h2>📚 Médiathèque Pro V2</h2>

<div class="small" id="stats"></div>

<input id="title" placeholder="Titre du livre">
<div id="auto" class="auto"></div>

<input id="author" placeholder="Auteur">

<select id="member">
  <option>Jérémy</option>
  <option>Marion</option>
</select>

<input type="date" id="date">

<button onclick="addBook()">➕ Ajouter</button>

<div class="filters">
  <button onclick="setFilter('all')" class="active">Tous</button>
  <button onclick="setFilter('Jérémy')">Jérémy</button>
  <button onclick="setFilter('Marion')">Marion</button>
</div>

<div id="list"></div>

<script>

/* ===================== STATE ===================== */
const KEY="mediatheque_v2";
let books=JSON.parse(localStorage.getItem(KEY))||[];
let filter="all";
let cache={};

/* ===================== SAVE ===================== */
function save(){
  localStorage.setItem(KEY,JSON.stringify(books));
}

/* ===================== DATE ===================== */
function computeReturn(d){
  let x=new Date(d);
  x.setMonth(x.getMonth()+1);
  return x.toISOString().split("T")[0];
}

/* ===================== ADD ===================== */
function addBook(){
  const title=titleEl.value.trim();
  const author=authorEl.value.trim();
  const member=memberEl.value;
  const date=dateEl.value;

  if(!title||!date)return;

  books.unshift({
    id:Date.now(),
    title,
    author,
    member,
    borrowDate:date,
    returnDate:computeReturn(date)
  });

  save();
  render();

  titleEl.value="";
  authorEl.value="";
}

/* ===================== FILTER ===================== */
function setFilter(f){
  filter=f;
  document.querySelectorAll(".filters button")
    .forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

/* ===================== STATS ===================== */
function updateStats(){
  const active=books.filter(b=>b.member);
  document.getElementById("stats").innerText=
    `📚 ${books.length} livres • 👤 Jérémy: ${books.filter(b=>b.member==="Jérémy").length} • Marion: ${books.filter(b=>b.member==="Marion").length}`;
}

/* ===================== RENDER (OPTIMISÉ) ===================== */
function render(){
  const list=books
    .filter(b=>filter==="all"?true:b.member===filter)
    .sort((a,b)=>new Date(a.returnDate)-new Date(b.returnDate));

  let html="";
  for(let b of list){
    const gcal=
      "https://calendar.google.com/calendar/render?action=TEMPLATE"+
      "&text="+encodeURIComponent("📚 "+b.title)+
      "&dates="+b.returnDate.replaceAll("-","")+"/"+b.returnDate.replaceAll("-","");

    html+=`
      <div class="card">
        <b>${b.title}</b><br>
        <span class="small">${b.author||""}</span><br>

        <span class="badge ${b.member==="Jérémy"?"jeremy":"marion"}">
          ${b.member}
        </span>

        <div class="small">📅 ${b.returnDate}</div>

        <button onclick="window.open('${gcal}','_blank')" style="margin-top:8px;background:#34a853">
          📅 Google Calendar
        </button>
      </div>
    `;
  }

  document.getElementById("list").innerHTML=
    html||"<div class='small'>Aucun livre</div>";

  updateStats();
}

/* ===================== AUTOCOMPLETE MULTI API ===================== */
async function search(q){
  if(q.length<2)return[];

  if(cache[q])return cache[q];

  const urls=[
    `https://openlibrary.org/search.json?q=${q}&limit=3`,
    `https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=3`
  ];

  try{
    const [ol,gb]=await Promise.all(urls.map(u=>fetch(u).catch(()=>null)));

    let res=[];

    if(ol&&ol.ok){
      const d=await ol.json();
      (d.docs||[]).forEach(b=>{
        res.push({title:b.title,author:(b.author_name||[]).join(", ")});
      });
    }

    if(gb&&gb.ok){
      const d=await gb.json();
      (d.items||[]).forEach(b=>{
        res.push({
          title:b.volumeInfo.title,
          author:(b.volumeInfo.authors||[]).join(", ")
        });
      });
    }

    cache[q]=res;
    return res;

  }catch{
    return[];
  }
}

/* ===================== AUTOCOMPLETE UI ===================== */
let timer;

titleEl.oninput=()=>{
  clearTimeout(timer);

  timer=setTimeout(async()=>{
    const data=await search(titleEl.value);

    auto.innerHTML=(data||[])
      .slice(0,6)
      .map(b=>`
        <div class="item" onclick="pick('${escape(b.title)}','${escape(b.author||"")}')">
          📖 ${b.title}
        </div>
      `).join("");
  },200);
};

function pick(t,a){
  titleEl.value=t;
  authorEl.value=a;
  auto.innerHTML="";
}

/* ===================== INIT ===================== */
const titleEl=document.getElementById("title");
const authorEl=document.getElementById("author");
const memberEl=document.getElementById("member");
const dateEl=document.getElementById("date");
const auto=document.getElementById("auto");

render();

</script>

</body>
</html>
