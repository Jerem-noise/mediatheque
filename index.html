<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médiathèque Jérémy & Marion</title>
<style>
body{font-family:system-ui;max-width:900px;margin:auto;padding:20px;background:#f5f7fb}
h1{text-align:center}
input,select,button{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{background:#4a6fa5;color:white;cursor:pointer}
.row{display:flex;gap:8px}
.row>*{flex:1}
.card{background:white;padding:12px;border-radius:10px;margin-top:10px}
.small{font-size:12px;color:#666}
.badge{padding:2px 8px;border-radius:999px;font-size:11px}
.j{background:#dbeafe}.m{background:#fce7f3}
#auto{background:white;border:1px solid #ddd;border-radius:8px;max-height:200px;overflow:auto}
.item{padding:8px;cursor:pointer}.item:hover{background:#f3f4f6}
</style>
</head>
<body>
<h1>📚 Médiathèque</h1>
<div id="stats"></div>

<input id="title" placeholder="Titre du livre">
<div id="auto"></div>
<input id="author" placeholder="Auteur">

<div class="row">
<select id="member">
<option>Jérémy</option>
<option>Marion</option>
</select>
<input type="date" id="date">
</div>

<button onclick="addBook()">➕ Ajouter</button>

<div class="row">
<button onclick="setFilter('all')">Tous</button>
<button onclick="setFilter('Jérémy')">Jérémy</button>
<button onclick="setFilter('Marion')">Marion</button>
</div>

<div id="list"></div>

<script>
const WORKER="https://proxy-bnf.batteux-jerem.workers.dev";
const KEY="mediatheque_v1";
let books=JSON.parse(localStorage.getItem(KEY)||"[]");
let filter="all";
let cache={};

const SCHOOL_HOLIDAYS=[
["2025-07-05","2025-09-01"],
["2025-10-18","2025-11-03"],
["2025-12-20","2026-01-05"],
["2026-02-14","2026-03-02"],
["2026-04-18","2026-05-04"],
["2026-07-04","2026-09-01"]
];

const titleEl=document.getElementById("title");
const authorEl=document.getElementById("author");
const memberEl=document.getElementById("member");
const dateEl=document.getElementById("date");
const autoEl=document.getElementById("auto");

function save(){localStorage.setItem(KEY,JSON.stringify(books));}

function isHoliday(date){
 const d=new Date(date);
 return SCHOOL_HOLIDAYS.some(([s,e])=>d>=new Date(s)&&d<=new Date(e));
}

function computeReturn(date){
 const d=new Date(date);
 if(isHoliday(date)) d.setDate(d.getDate()+45);
 else d.setMonth(d.getMonth()+1);
 return d.toISOString().split("T")[0];
}

function addBook(){
 if(!titleEl.value||!dateEl.value) return;
 books.unshift({
  id:Date.now(),
  title:titleEl.value,
  author:authorEl.value,
  member:memberEl.value,
  borrowDate:dateEl.value,
  returnDate:computeReturn(dateEl.value)
 });
 save();
 render();
 titleEl.value="";
 authorEl.value="";
 autoEl.innerHTML="";
}

function del(id){
 books=books.filter(b=>b.id!==id);
 save();
 render();
}

function setFilter(f){filter=f;render();}

function openGoogleCalendar(book){
 const start=book.borrowDate.replaceAll("-","");
 const endDate=new Date(book.returnDate);
 endDate.setDate(endDate.getDate()+1);
 const end=endDate.toISOString().split("T")[0].replaceAll("-","");
 const url="https://calendar.google.com/calendar/render?action=TEMPLATE"
 +"&text="+encodeURIComponent("📚 "+book.title)
 +"&dates="+start+"/"+end;
 window.open(url,"_blank");
}

function render(){
 const list=[...books]
 .filter(b=>filter==="all"||b.member===filter)
 .sort((a,b)=>new Date(a.returnDate)-new Date(b.returnDate));

 document.getElementById("stats").innerText="📚 "+books.length+" livres";

 document.getElementById("list").innerHTML=list.map(b=>`
 <div class="card">
 <b>${b.title}</b><br>
 <span class="small">${b.author||""}</span><br>
 <span class="badge ${b.member==="Jérémy"?"j":"m"}">${b.member}</span>
 <div class="small">📅 ${b.returnDate} ${isHoliday(b.borrowDate)?"🏖 45 jours":"📘 1 mois"}</div>
 <div class="row">
 <button onclick="openGoogleCalendar(books.find(x=>x.id===${b.id}))">Google Calendar</button>
 <button onclick="del(${b.id})" style="background:#e74c3c">Supprimer</button>
 </div>
 </div>`).join("");
}

let timer;
titleEl.addEventListener("input",()=>{
 clearTimeout(timer);
 timer=setTimeout(async()=>{
  const q=titleEl.value.trim();
  if(q.length<2)return;
  try{
   if(cache[q]) return draw(cache[q]);
   const r=await fetch(WORKER+"?q="+encodeURIComponent(q));
   const data=await r.json();
   cache[q]=data;
   draw(data);
  }catch(e){}
 },250);
});

function draw(data){
 autoEl.innerHTML=(data||[]).slice(0,8).map(b=>
 `<div class="item" onclick="pick('${(b.title||"").replace(/'/g,"&#39;")}','${(b.author||"").replace(/'/g,"&#39;")}')">📖 ${b.title}</div>`
 ).join("");
}

function pick(t,a){
 titleEl.value=t;
 authorEl.value=a;
 autoEl.innerHTML="";
}

render();
</script>
</body>
</html>
