<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Médiathèque</title>

<style>
body {
  margin:0;
  font-family:-apple-system, system-ui, sans-serif;
  background: linear-gradient(135deg,#f5f7ff,#fdf0ff);
  -webkit-font-smoothing: antialiased;
}

header {
  padding:40px 20px 20px;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#1a1a2e,#16213e);
}

h1 { margin:0; font-size:26px; }

.container {
  max-width:600px;
  margin:auto;
  padding:16px;
}

.card {
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  transform: translateY(0);
  transition: 0.2s;
}

.card:active {
  transform: scale(0.98);
}

input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#4a6fa5;
  color:white;
  font-weight:600;
  font-size:16px;
}

.list {
  margin-top:15px;
}

.badge {
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  background:#eee;
  display:inline-block;
  margin-top:6px;
}
</style>
</head>

<body>

<header>
  <h1>📚 Médiathèque</h1>
</header>

<div class="container">

  <input id="title" placeholder="Titre du livre">
  <input id="author" placeholder="Auteur">
  <button onclick="addBook()">Ajouter</button>

  <div class="list" id="list"></div>

</div>

<script>
let books = JSON.parse(localStorage.getItem("books") || "[]");

function save(){
  localStorage.setItem("books", JSON.stringify(books));
}

function addBook(){
  const t = document.getElementById("title").value;
  const a = document.getElementById("author").value;

  if(!t) return;

  books.unshift({
    id: Date.now(),
    title:t,
    author:a
  });

  save();
  render();

  document.getElementById("title").value="";
  document.getElementById("author").value="";
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  books.forEach(b => {
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <div><strong>${b.title}</strong></div>
      <div style="opacity:.6">${b.author || ""}</div>
      <div class="badge">tap = supprimer</div>
    `;

    div.onclick = () => {
      books = books.filter(x => x.id !== b.id);
      save();
      render();
    };

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
