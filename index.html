<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Médiathèque Pro</title>

<style>
body{
  font-family:system-ui;
  background:#f5f7fb;
  max-width:800px;
  margin:auto;
  padding:20px;
}

h2{text-align:center}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4a6fa5;
  color:#fff;
  cursor:pointer;
  margin-top:6px;
}

.filters{
  display:flex;
  gap:6px;
  margin:10px 0;
}

.filters button{
  flex:1;
  background:#e5e7eb;
  color:#111;
}

.filters button.active{
  background:#4a6fa5;
  color:#fff;
}

.card{
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.badge{
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
}

.jeremy{background:#dbeafe;}
.marion{background:#fce7f3;}

.auto{
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  max-height:200px;
  overflow:auto;
}

.item{
  padding:8px;
  cursor:pointer;
}
.item:hover{background:#f3f4f6;}

.small{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<h2>📚 Médiathèque Pro</h2>

<div class="small" id="stats"></div>

<input id="title" placeholder="Titre du livre">
<div id="auto" class="auto"></div>

<input id="author" placeholder="Auteur">

<select id="member">
  <option>Jérémy</option>
  <option>Marion</option>
</select>

<input type="date" id="date">

<button id="addBtn">➕ Ajouter</button>

<div class="filters">
  <button data-filter="all" class="active">Tous</button>
  <button data-filter="Jérémy">Jérémy</button>
  <button data-filter="Marion">Marion</button>
</div>

<div id="list"></div>

<script>

/* ================= CONFIG ================= */
const WORKER = "https://proxy-bnf.batteux-jerem.workers.dev";
const STORAGE_KEY = "mediatheque_final_v1";

/* ================= DOM ================= */
const titleEl = document.getElementById("title");
const authorEl = document.getElementById("author");
const memberEl = document.getElementById("member");
const dateEl = document.getElementById("date");
const autoEl = document.getElementById("auto");
const listEl = document.getElementById("list");
const statsEl = document.getElementById("stats");
const addBtn = document.getElementById("addBtn");

/* ================= STATE ================= */
let books = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let filter = "all";
let cache = new Map();

/* ================= SAVE ================= */
const save = () =>
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));

/* ================= DATE ================= */
const computeReturn = (d) => {
  let x = new Date(d);
  x.setMonth(x.getMonth() + 1);
  return x.toISOString().split("T")[0];
};

/* ================= ADD ================= */
function addBook(){
  if(!titleEl.value || !dateEl.value) return;

  books.unshift({
    id: Date.now(),
    title: titleEl.value.trim(),
    author: authorEl.value.trim(),
    member: memberEl.value,
    borrowDate: dateEl.value,
    returnDate: computeReturn(dateEl.value)
  });

  save();
  render();

  titleEl.value = "";
  authorEl.value = "";
}

/* ================= FILTER ================= */
document.querySelectorAll(".filters button").forEach(btn=>{
  btn.addEventListener("click", (e)=>{
    filter = btn.dataset.filter;

    document.querySelectorAll(".filters button")
      .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    render();
  });
});

/* ================= STATS ================= */
function updateStats(){
  statsEl.innerText =
    `📚 ${books.length} livres • 👤 Jérémy: ${books.filter(b=>b.member==="Jérémy").length} • Marion: ${books.filter(b=>b.member==="Marion").length}`;
}

/* ================= RENDER OPTIMIZED ================= */
function render(){
  const filtered = books
    .filter(b => filter === "all" ? true : b.member === filter)
    .sort((a,b)=> new Date(a.returnDate) - new Date(b.returnDate));

  listEl.textContent = "";

  const frag = document.createDocumentFragment();

  for(const b of filtered){
    const div = document.createElement("div");
    div.className = "card";

    const gcal =
      "https://calendar.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent("📚 " + b.title) +
      "&dates=" + b.returnDate.replaceAll("-","") + "/" + b.returnDate.replaceAll("-","");

    div.innerHTML = `
      <b>${b.title}</b><br>
      <span class="small">${b.author || ""}</span><br>

      <span class="badge ${b.member==="Jérémy"?"jeremy":"marion"}">
        ${b.member}
      </span>

      <div class="small">📅 ${b.returnDate}</div>

      <button style="margin-top:8px;background:#34a853"
        onclick="window.open('${gcal}','_blank')">
        📅 Google Calendar
      </button>
    `;

    frag.appendChild(div);
  }

  listEl.appendChild(frag);
  updateStats();
}

/* ================= AUTOCOMPLETE ================= */
let timer;

async function search(q){
  if(q.length < 2) return [];

  if(cache.has(q)) return cache.get(q);

  try {
    const res = await fetch(`${WORKER}?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    cache.set(q, data);
    return data;

  } catch {
    return [];
  }
}

/* debounce clean */
titleEl.addEventListener("input", ()=>{
  clearTimeout(timer);

  timer = setTimeout(async ()=>{
    const data = await search(titleEl.value);

    autoEl.innerHTML = (data || [])
      .slice(0,6)
      .map(b=>`
        <div class="item" onclick="pick('${b.title}','${b.author || ""}')">
          📖 ${b.title}
        </div>
      `).join("");

  }, 200);
});

function pick(t,a){
  titleEl.value = t;
  authorEl.value = a;
  autoEl.innerHTML = "";
}

/* ================= INIT ================= */
addBtn.addEventListener("click", addBook);

render();

</script>

</body>
</html>
