<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médiathèque Pro Cloudflare</title>

<style>
body{
  font-family:system-ui;
  background:#f5f7fb;
  max-width:800px;
  margin:auto;
  padding:20px;
}

h2{text-align:center}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4a6fa5;
  color:#fff;
  cursor:pointer;
  margin-top:6px;
}

.filters{
  display:flex;
  gap:6px;
  margin:10px 0;
}

.filters button{
  flex:1;
  background:#e5e7eb;
  color:#111;
}

.filters button.active{
  background:#4a6fa5;
  color:#fff;
}

.card{
  background:#fff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.badge{
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
}

.jeremy{background:#dbeafe;}
.marion{background:#fce7f3;}

.auto{
  background:#fff;
  border:1px solid #ddd;
  border-radius:8px;
  max-height:200px;
  overflow:auto;
}

.item{
  padding:8px;
  cursor:pointer;
}
.item:hover{background:#f3f4f6;}

.small{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<h2>📚 Médiathèque Pro</h2>

<div class="small" id="stats"></div>

<input id="title" placeholder="Titre du livre">
<div id="auto" class="auto"></div>

<input id="author" placeholder="Auteur">

<select id="member">
  <option>Jérémy</option>
  <option>Marion</option>
</select>

<input type="date" id="date">

<button onclick="addBook()">➕ Ajouter</button>

<div class="filters">
  <button onclick="setFilter('all')" class="active">Tous</button>
  <button onclick="setFilter('Jérémy')">Jérémy</button>
  <button onclick="setFilter('Marion')">Marion</button>
</div>

<div id="list"></div>

<script>

/* ================= CONFIG ================= */
const WORKER = "https://proxy-bnf.batteux-jerem.workers.dev";
const KEY = "mediatheque_cloudflare_v1";

/* ================= STATE ================= */
let books = JSON.parse(localStorage.getItem(KEY)) || [];
let filter = "all";
let cache = new Map();

/* ================= SAVE ================= */
const save = () =>
  localStorage.setItem(KEY, JSON.stringify(books));

/* ================= DATE ================= */
const computeReturn = (d) => {
  let x = new Date(d);
  x.setMonth(x.getMonth() + 1);
  return x.toISOString().split("T")[0];
};

/* ================= ADD ================= */
function addBook(){
  const title = titleEl.value.trim();
  if(!title || !dateEl.value) return;

  books.unshift({
    id: Date.now(),
    title,
    author: authorEl.value.trim(),
    member: memberEl.value,
    borrowDate: dateEl.value,
    returnDate: computeReturn(dateEl.value)
  });

  save();
  render();

  titleEl.value = "";
  authorEl.value = "";
}

/* ================= FILTER ================= */
function setFilter(f){
  filter = f;
  document.querySelectorAll(".filters button")
    .forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

/* ================= STATS ================= */
function updateStats(){
  stats.innerText =
    `📚 ${books.length} livres • 👤 Jérémy: ${books.filter(b=>b.member==="Jérémy").length} • Marion: ${books.filter(b=>b.member==="Marion").length}`;
}

/* ================= RENDER OPTIMISÉ ================= */
function render(){
  const list = books
    .filter(b => filter === "all" ? true : b.member === filter)
    .sort((a,b) => new Date(a.returnDate) - new Date(b.returnDate));

  listEl.textContent = "";

  const frag = document.createDocumentFragment();

  for(const b of list){
    const div = document.createElement("div");
    div.className = "card";

    const gcal =
      "https://calendar.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent("📚 " + b.title) +
      "&dates=" + b.returnDate.replaceAll("-","") + "/" + b.returnDate.replaceAll("-","");

    div.innerHTML = `
      <b>${b.title}</b><br>
      <span class="small">${b.author || ""}</span><br>

      <span class="badge ${b.member==="Jérémy"?"jeremy":"marion"}">
        ${b.member}
      </span>

      <div class="small">📅 ${b.returnDate}</div>

      <button style="margin-top:8px;background:#34a853"
        onclick="window.open('${gcal}','_blank')">
        📅 Google Calendar
      </button>
    `;

    frag.appendChild(div);
  }

  listEl.appendChild(frag);
  updateStats();
}

/* ================= AUTOCOMPLETE VIA CLOUDFARE ================= */
let t;

async function search(q){
  if(q.length < 2) return [];

  if(cache.has(q)) return cache.get(q);

  try {
    const res = await fetch(`${WORKER}?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    cache.set(q, data);
    return data;

  } catch {
    return [];
  }
}

/* ================= AUTOCOMPLETE UI ================= */
titleEl.oninput = () => {
  clearTimeout(t);

  t = setTimeout(async () => {
    const data = await search(titleEl.value);

    auto.innerHTML = (data || [])
      .slice(0,6)
      .map(b => `
        <div class="item" onclick="pick('${b.title}','${b.author || ""}')">
          📖 ${b.title}
        </div>
      `).join("");

  }, 200);
};

function pick(t,a){
  titleEl.value = t;
  authorEl.value = a;
  auto.innerHTML = "";
}

/* ================= INIT ================= */
const titleEl = document.getElementById("title");
const authorEl = document.getElementById("author");
const memberEl = document.getElementById("member");
const dateEl = document.getElementById("date");
const auto = document.getElementById("auto");
const listEl = document.getElementById("list");
const stats = document.getElementById("stats");

render();

</script>

</body>
</html>
