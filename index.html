<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Médiathèque</title>
  <style>
    body {
      font-family: system-ui;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f5f7fb;
    }

    h2 {
      text-align: center;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #4a6fa5;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 6px;
    }

    .row button {
      flex: 1;
      font-size: 12px;
    }

    .card {
      background: #fff;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .j {
      background: #dbeafe;
    }

    .m {
      background: #fce7f3;
    }

    #auto {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-height: 180px;
      overflow: auto;
    }

    .item {
      padding: 8px;
      cursor: pointer;
    }

    .item:hover {
      background: #f3f4f6;
    }

    /* Indicateur de chargement */
    .loading {
      padding: 8px;
      font-size: 12px;
      color: #666;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top-color: #4a6fa5;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      color: #e74c3c;
    }
  </style>
</head>

<body>
  <h2>📚 Médiathèque</h2>
  <div id="stats" class="small"></div>

  <input id="title" placeholder="Titre">
  <div id="auto"></div>

  <input id="author" placeholder="Auteur">

  <select id="member">
    <option>Jérémy</option>
    <option>Marion</option>
  </select>

  <input type="date" id="date">

  <button onclick="addBook()">➕ Ajouter</button>

  <div class="row">
    <button onclick="setFilter('all')">Tous</button>
    <button onclick="setFilter('Jérémy')">Jérémy</button>
    <button onclick="setFilter('Marion')">Marion</button>
  </div>

  <div id="list"></div>

  <script>
    /* ================= CONSTANTES ================= */
    const WORKER = "https://proxy-bnf.batteux-jerem.workers.dev";
    const STORAGE_KEY = "books_v1";
    const MIN_QUERY_LENGTH = 2;
    const DEBOUNCE_DELAY = 200; // ms

    /* ================= ÉTAT ================= */
    let books = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let filter = "all";
    let cache = {};
    let isLoading = false;

    /* ================= ÉLÉMENTS DOM ================= */
    const titleEl = document.getElementById("title");
    const authorEl = document.getElementById("author");
    const memberEl = document.getElementById("member");
    const dateEl = document.getElementById("date");
    const listEl = document.getElementById("list");
    const autoEl = document.getElementById("auto");
    const statsEl = document.getElementById("stats");

    /* ================= FONCTIONS UTILITAIRES ================= */
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    function computeReturn(dateStr) {
      const date = new Date(dateStr);
      date.setMonth(date.getMonth() + 1);
      return date.toISOString().split("T")[0];
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    /* ================= GESTION DES LIVRES ================= */
    function addBook() {
      if (!titleEl.value || !dateEl.value) return;

      const newBook = {
        id: Date.now(),
        title: titleEl.value,
        author: authorEl.value,
        member: memberEl.value,
        date: dateEl.value,
        return: computeReturn(dateEl.value),
      };

      books.unshift(newBook);
      save();
      render();
      resetForm();
    }

    function del(id) {
      if (confirm("Voulez-vous vraiment supprimer ce livre ?")) {
        books = books.filter((b) => b.id !== id);
        save();
        render();
      }
    }

    /* ================= FILTRES ================= */
    function setFilter(f) {
      filter = f;
      render();
    }

    /* ================= AFFICHAGE ================= */
    function render() {
      const filteredBooks = filter === "all"
        ? books
        : books.filter((b) => b.member === filter);

      const sortedBooks = [...filteredBooks].sort(
        (a, b) => new Date(a.return) - new Date(b.return)
      );

      if (sortedBooks.length === 0) {
        listEl.innerHTML = '<div class="card small">Aucun livre trouvé.</div>';
      } else {
        listEl.innerHTML = sortedBooks
          .map((book) => {
            const gcalUrl =
              "https://calendar.google.com/calendar/render?action=TEMPLATE" +
              `&text=${encodeURIComponent("📚 " + book.title)}` +
              `&dates=${book.return.replaceAll("-", "")}/${book.return.replaceAll("-", "")}`;

            return `
              <div class="card">
                <b>${escapeHtml(book.title)}</b><br>
                <span class="small">${escapeHtml(book.author || "")}</span><br>
                <span class="badge ${book.member === "Jérémy" ? "j" : "m"}">
                  ${escapeHtml(book.member)}
                </span>
                <div class="small">📅 ${book.return}</div>
                <div class="row">
                  <button onclick="window.open('${gcalUrl}', '_blank')">
                    Google Calendar
                  </button>
                  <button onclick="del(${book.id})" style="background:#e74c3c">
                    Supprimer
                  </button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      statsEl.textContent = `📚 ${books.length} livres`;
    }

    function resetForm() {
      titleEl.value = "";
      authorEl.value = "";
      autoEl.innerHTML = "";
    }

    /* ================= AUTOCOMPLÉTION ================= */
    let debounceTimer;

    titleEl.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      const query = titleEl.value.trim();

      if (query.length < MIN_QUERY_LENGTH) {
        autoEl.innerHTML = "";
        return;
      }

      // Afficher l'indicateur de chargement
      if (!isLoading) {
        isLoading = true;
        autoEl.innerHTML = `
          <div class="item loading">
            <span class="spinner"></span>
            Recherche en cours...
          </div>
        `;
      }

      debounceTimer = setTimeout(async () => {
        if (cache[query]) {
          drawAutocomplete(cache[query]);
          isLoading = false;
          return;
        }

        try {
          const response = await fetch(`${WORKER}?q=${encodeURIComponent(query)}`);
          if (!response.ok) throw new Error("Erreur réseau");
          const data = await response.json();
          cache[query] = data;
          drawAutocomplete(data);
        } catch (error) {
          autoEl.innerHTML = `
            <div class="item loading error">
              ⚠️ Erreur de connexion
            </div>
          `;
        } finally {
          isLoading = false;
        }
      }, DEBOUNCE_DELAY);
    });

    function drawAutocomplete(data) {
      if (!data || data.length === 0) {
        autoEl.innerHTML = '<div class="item small">Aucun résultat trouvé.</div>';
        return;
      }

      autoEl.innerHTML = data
        .slice(0, 8)
        .map(
          (book) => `
            <div class="item" onclick="pick('${escapeHtml(book.title)}', '${escapeHtml(book.author || "")}')">
              📖 ${escapeHtml(book.title)}
            </div>
          `
        )
        .join("");
    }

    function pick(title, author) {
      titleEl.value = title;
      authorEl.value = author;
      autoEl.innerHTML = "";
    }

    /* ================= INITIALISATION ================= */
    render();
  </script>
</body>
</html>
