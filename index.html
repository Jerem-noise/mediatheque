<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Médiathèque</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
body {
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    background: #f5f5f7;
}

.card {
    border-radius: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.7);
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding-bottom: env(safe-area-inset-bottom);
}
</style>
</head>

<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<script type="text/babel">

const PROXY = "https://proxy-bnf.batteux-jerem.workers.dev/?url=";

const fetchWithProxy = async (url) => {
    const res = await fetch(PROXY + encodeURIComponent(url));
    return await res.text();
};

// --- SEARCH SIMPLE ---
const searchBooks = async (q) => {
    if (q.length < 2) return [];

    const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=6`;
    const data = JSON.parse(await fetchWithProxy(url));

    return (data.docs || []).map((b, i) => ({
        id: i,
        title: b.title,
        author: b.author_name?.[0] || "Auteur inconnu"
    }));
};

function App() {

const [tab, setTab] = React.useState("search");
const [q, setQ] = React.useState("");
const [results, setResults] = React.useState([]);
const [library, setLibrary] = React.useState(() =>
    JSON.parse(localStorage.getItem("lib") || "[]")
);

React.useEffect(() => {
    localStorage.setItem("lib", JSON.stringify(library));
}, [library]);

React.useEffect(() => {
    const t = setTimeout(async () => {
        if (q.length > 1) {
            setResults(await searchBooks(q));
        } else {
            setResults([]);
        }
    }, 300);

    return () => clearTimeout(t);
}, [q]);

const addBook = (b) => {
    setLibrary([b, ...library]);
};

return (

<div className="pb-24">

{/* HEADER iOS STYLE */}
<div className="px-4 pt-6 pb-3">
    <h1 className="text-2xl font-bold text-gray-900">📚 Médiathèque</h1>
    <p className="text-sm text-gray-500">Ta bibliothèque personnelle</p>
</div>

{/* SEARCH */}
{tab === "search" && (
<div className="px-4">
    <input
        className="w-full p-4 rounded-2xl bg-white shadow-sm outline-none"
        placeholder="Rechercher un livre..."
        value={q}
        onChange={(e) => setQ(e.target.value)}
    />

    <div className="mt-4 space-y-3">
        {results.map(b => (
            <div key={b.id} className="card bg-white p-4 flex justify-between items-center">
                <div>
                    <div className="font-semibold">{b.title}</div>
                    <div className="text-sm text-gray-500">{b.author}</div>
                </div>
                <button
                    className="bg-black text-white px-3 py-1 rounded-full text-sm"
                    onClick={() => addBook(b)}
                >
                    +
                </button>
            </div>
        ))}
    </div>
</div>
)}

{/* LIBRARY */}
{tab === "library" && (
<div className="px-4 space-y-3">
    {library.length === 0 && (
        <div className="text-center text-gray-400 mt-10">
            Aucun livre
        </div>
    )}

    {library.map((b, i) => (
        <div key={i} className="card bg-white p-4">
            <div className="font-semibold">{b.title}</div>
            <div className="text-sm text-gray-500">{b.author}</div>
        </div>
    ))}
</div>
)}

{/* BOTTOM NAV (iOS style) */}
<div className="bottom-nav glass border-t border-gray-200 flex justify-around py-3">

<button onClick={() => setTab("search")} className="text-sm">
🔍<div>Search</div>
</button>

<button onClick={() => setTab("library")} className="text-sm">
📚<div>Library</div>
</button>

</div>

</div>

);

}

ReactDOM.render(<App />, document.getElementById("app"));

</script>

</body>
</html>
