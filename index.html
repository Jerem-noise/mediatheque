    <script type="text/babel">
        // --- Composant Icon avec SVG inline (remplace Lucide CDN) ---

                AlertCircle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>,
                Barcode: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="3" x2="21" y2="3" /><line x1="3" y1="7" x2="21" y2="7" /><line x1="3" y1="11" x2="21" y2="11" /><line x1="3" y1="15" x2="21" y2="15" /><line x1="3" y1="19" x2="21" y2="19" /></svg>,
                Calendar: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
                Sparkles: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /><path d="M5 3v4" /><path d="M19 17v4" /><path d="M3 5h4" /><path d="M17 19h4" /></svg>,
                Edit3: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></svg>,
                PlusCircle: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></svg>
            };
            return icons[name] || <span>❓</span>;
        };

        // --- SERVICES API & PROXY ---
        const PROXIES = [
            "https://proxy-bnf.batteux-jerem.workers.dev/?url=",
            "https://corsproxy.io/?",
            "https://api.allorigins.win/get?url="
        ];

        const fetchWithProxy = async (targetUrl) => {
            let lastError = null;
            for (const proxy of PROXIES) {
                try {
                    const url = proxy.includes("allorigins") || proxy.includes("workers.dev")
                        ? `${proxy}${encodeURIComponent(targetUrl)}`
                        : `${proxy}${targetUrl}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const text = await response.text();
                    if (proxy.includes("allorigins")) {
                        const json = JSON.parse(text);
                        return json.contents;
                    }
                    return text;
                } catch (err) {
                    console.warn(`Proxy ${proxy} échoué:`, err.message);
                    lastError = err;
                }
            }
            throw new Error("Tous les proxys CORS ont échoué.");
        };

        const searchBnf = async (query) => {
            try {
                const bnfUrl = `https://catalogue.bnf.fr/api/SRU?version=1.2&operation=searchRetrieve&query=bib.anywhere%20all%20%22${encodeURIComponent(query)}%22%20and%20bib.recordtype%20all%20%22a%22&maximumRecords=8`;
                const responseText = await fetchWithProxy(bnfUrl);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(responseText, "text/xml");
                if (xmlDoc.querySelector("parsererror")) {
                    throw new Error("Erreur de formatage des données distantes.");
                }
                const records = xmlDoc.getElementsByTagName("srw:record");
                const books = [];
                for (let i = 0; i < records.length; i++) {
                    const record = records[i];
                    const title = record.getElementsByTagName("dc:title")[0]?.textContent || "Titre inconnu";
                    const creator = record.getElementsByTagName("dc:creator")[0]?.textContent || "Auteur inconnu";
                    const identifier = record.getElementsByTagName("dc:identifier")[0]?.textContent || "";
                    const isbn = identifier.includes("ISBN") ? identifier.replace(/ISBN\s*/i, "").trim() : "";
                    books.push({
                        id: `bnf-${i}-${Date.now()}`,
                        title: title,
                        author: creator,
                        isbn: isbn,
                        source: "BnF"
                    });
                }
                return books;
            } catch (err) {
                console.error("Erreur BnF:", err);
                throw err;
            }
        };

        const searchOpenLibrary = async (query) => {
            try {
                const olUrl = `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=8`;
                const responseText = await fetchWithProxy(olUrl);
                const data = JSON.parse(responseText);
                return (data.docs || []).map((doc, index) => ({
                    id: `ol-${index}-${Date.now()}`,
                    title: doc.title || "Titre inconnu",
                    author: doc.author_name?.[0] || "Auteur inconnu",
                    isbn: doc.isbn?.[0] || "",
                    source: "OpenLibrary"
                }));
            } catch (err) {
                console.error("Erreur OpenLibrary:", err);
                throw err;
            }
        };

        const searchBooks = async (query) => {
            if (!query || query.trim().length < 2) return [];
            try {
                return await searchBnf(query);
            } catch (bnfError) {
                console.warn("Échec BnF, bascule sur OpenLibrary...");
                try {
                    return await searchOpenLibrary(query);
                } catch (olError) {
                    throw new Error("Impossible de contacter les APIs de recherche.");
                }
            }
        };

        // --- APPLICATION PRINCIPALE (REACT) ---
        const MediathequeApp = () => {
            const [books, setBooks] = React.useState(() => {
                const saved = localStorage.getItem("mediatheque_books");
                return saved ? JSON.parse(saved) : [];
            });
            const [searchQuery, setSearchQuery] = React.useState("");
            const [apiResults, setApiResults] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(false);
            const [apiError, setApiError] = React.useState(false);
            const [filter, setFilter] = React.useState("all");
            const [manualTitle, setManualTitle] = React.useState("");
            const [manualAuthor, setManualAuthor] = React.useState("");
            const [manualIsbn, setManualIsbn] = React.useState("");
            const [editingId, setEditingId] = React.useState(null);

            React.useEffect(() => {
                localStorage.setItem("mediatheque_books", JSON.stringify(books));
            }, [books]);

            React.useEffect(() => {
                const timer = setTimeout(async () => {
                    if (searchQuery.trim().length > 1) {
                        setIsLoading(true);
                        setApiError(false);
                        try {
                            const results = await searchBooks(searchQuery);
                            setApiResults(results);
                        } catch (err) {
                            setApiResults([]);
                            setApiError(true);
                        } finally {
                            setIsLoading(false);
                        }
                    } else {
                        setApiResults([]);
                        setApiError(false);
                    }
                }, 500);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            const handleAddBook = (bookData) => {
                const isDuplicate = books.some(b => b.title.toLowerCase() === bookData.title.toLowerCase() && b.author.toLowerCase() === bookData.author.toLowerCase());
                if (isDuplicate) {
