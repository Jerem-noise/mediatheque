<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médiathèque Pro</title>

<style>
body {
  font-family: system-ui;
  background: #f5f7fb;
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h2 { text-align:center; }

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 10px;
  background: #4a6fa5;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 6px;
  cursor: pointer;
}

.filters {
  display: flex;
  gap: 6px;
  margin: 10px 0;
}

.filters button {
  flex: 1;
  background: #e5e7eb;
  color: black;
}

.filters button.active {
  background: #4a6fa5;
  color: white;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.badge {
  display:inline-block;
  font-size:11px;
  padding:2px 8px;
  border-radius:999px;
}

.jeremy { background:#dbeafe; }
.marion { background:#fce7f3; }

.auto {
  background:white;
  border:1px solid #ddd;
  border-radius:8px;
  max-height:150px;
  overflow:auto;
}

.item {
  padding:8px;
  cursor:pointer;
}

.item:hover {
  background:#f3f4f6;
}
</style>
</head>

<body>

<h2>📚 Médiathèque Pro</h2>

<input id="title" placeholder="Titre">
<div id="auto" class="auto"></div>

<input id="author" placeholder="Auteur">

<select id="member">
  <option>Jérémy</option>
  <option>Marion</option>
</select>

<input type="date" id="date">

<button onclick="addBook()">➕ Ajouter</button>

<div class="filters">
  <button onclick="setFilter('all')" class="active">Tous</button>
  <button onclick="setFilter('Jérémy')">Jérémy</button>
  <button onclick="setFilter('Marion')">Marion</button>
</div>

<div id="list"></div>

<script>
const WORKER = "https://ton-worker.workers.dev/";
let books = [];
let filter = "all";

/* ☁️ LOAD */
async function loadBooks(){
  const r = await fetch(WORKER);
  books = await r.json();
  render();
}

/* ☁️ SAVE */
async function save(){
  await fetch(WORKER, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(books)
  });
}

/* 📅 DATE */
function computeReturn(date){
  let d = new Date(date);
  d.setMonth(d.getMonth()+1);
  return d.toISOString().split("T")[0];
}

/* ➕ ADD */
function addBook(){
  const title = titleEl.value.trim();
  const author = authorEl.value.trim();
  const member = memberEl.value;
  const date = dateEl.value;

  if(!title || !date) return;

  books.unshift({
    title,
    author,
    member,
    borrowDate: date,
    returnDate: computeReturn(date)
  });

  save();
  render();

  titleEl.value = "";
  authorEl.value = "";
}

/* 🎯 FILTER */
function setFilter(f){
  filter = f;
  document.querySelectorAll(".filters button")
    .forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

/* 📚 RENDER */
function render(){
  const list = books
    .filter(b => filter==="all"?true:b.member===filter)
    .sort((a,b)=> new Date(a.returnDate)-new Date(b.returnDate));

  document.getElementById("list").innerHTML = list.map(b => `
    <div class="card">
      <b>${b.title}</b><br>
      ${b.author || ""}<br>

      <span class="badge ${b.member==="Jérémy"?"jeremy":"marion"}">
        ${b.member}
      </span>

      <div>📅 ${b.returnDate}</div>
    </div>
  `).join("");
}

/* 🔎 AUTOCOMPLETE (simple mock) */
async function search(q){
  if(q.length<2) return [];
  const r = await fetch(WORKER+"?q="+q);
  return await r.json();
}

let timer;

titleEl.oninput = () => {
  clearTimeout(timer);
  timer = setTimeout(async () => {
    const data = await search(titleEl.value);

    auto.innerHTML = (data||[]).slice(0,5).map(b => `
      <div class="item" onclick="pick('${b.title}','${b.author||""}')">
        📖 ${b.title}
      </div>
    `).join("");
  }, 200);
};

function pick(t,a){
  titleEl.value=t;
  authorEl.value=a;
  auto.innerHTML="";
}

/* INIT */
const titleEl = document.getElementById("title");
const authorEl = document.getElementById("author");
const memberEl = document.getElementById("member");
const dateEl = document.getElementById("date");
const auto = document.getElementById("auto");

loadBooks();
</script>

</body>
</html>
